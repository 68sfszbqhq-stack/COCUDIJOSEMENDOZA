<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultura Digital I — José Roberto Mendoza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color: #1A7A4A;
            --color-dark: #145C38;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('portada_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* ===== BARRA DE NAVEGACIÓN SUPERIOR ===== */
        #top-nav {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 500;
            height: 56px;
            background: rgba(15, 15, 15, 0.93);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 2px solid rgba(26, 122, 74, 0.55);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .nav-brand {
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }
        .nav-links { display: flex; gap: 6px; }
        .nav-link {
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 7px 16px;
            border-radius: 8px;
            text-decoration: none;
            color: rgba(255,255,255,0.65);
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.12);
        }
        .nav-link.active-subject {
            background: var(--color);
            color: white;
            border-color: var(--color-dark);
        }
        .nav-link.active-subject:hover { background: var(--color-dark); }
        @media (max-width: 480px) {
            .nav-brand { display: none; }
            .nav-link { font-size: 0.68rem; padding: 6px 10px; }
        }

        .main-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 20px 40px;
        }
        .glass-container {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 60px 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.3);
            width: 100%;
            max-width: 860px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav id="top-nav">
        <span class="nav-brand">MCCEMS · Cultura Digital · SEP 2025</span>
        <div class="nav-links">
            <a href="index.html" target="_blank" class="nav-link">
                <i class="fas fa-network-wired" style="margin-right:4px;"></i> PLN Cultura Digital
            </a>
            <a href="pln-flipboard.html" target="_blank" class="nav-link" style="background:#7C3AED;color:white;border-color:#5B21B6;">
                <i class="fas fa-newspaper" style="margin-right:4px;"></i> PLN Feed
            </a>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="glass-container">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-full mb-6"
                 style="background: var(--color);">
                <i class="fas fa-seedling text-white text-4xl"></i>
            </div>
            <h1 class="text-5xl font-black mb-3" style="color: var(--color);">Cultura Digital I</h1>
            <p class="text-xl text-gray-600 font-semibold mb-2">José Roberto Mendoza Mendoza · 1er Semestre</p>
            <p class="text-sm text-gray-400 font-medium mb-10">MCCEMS · SEP 2025 · Bachillerato · Puebla, México</p>

            <div class="bg-gray-50 rounded-3xl p-10 border-l-8 text-left mb-6" style="border-color: var(--color);">
                <p class="text-gray-500 text-lg font-medium italic text-center">
                    Contenido en construcción — próximamente aquí.<br>
                    <span class="text-sm not-italic text-gray-400">Dime qué quieres implementar y lo agrego.</span>
                </p>
            </div>

            <a href="index.html" class="inline-flex items-center gap-2 text-gray-500 font-bold hover:text-gray-800 transition text-sm">
                <i class="fas fa-arrow-left"></i> Volver a Cultura Digital II
            </a>
        </div>
    </div>

</body>
</html>
